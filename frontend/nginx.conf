server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large multipart uploads (voice recordings) without nginx rejecting them.
    client_max_body_size 100m;
    client_body_timeout 0;
    send_timeout 0;

    # No proxy timeout — long voice uploads and AI must not be cut off mid-request.
    proxy_connect_timeout 0;
    proxy_read_timeout 0;
    proxy_send_timeout 0;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 0;
        proxy_read_timeout 0;
        proxy_send_timeout 0;
    }

    # Voice files live on the Node API — without this, /uploads/* falls through to SPA (HTML) and <audio> fails.
    location ^~ /uploads/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 0;
        proxy_read_timeout 0;
        proxy_send_timeout 0;
    }
}
