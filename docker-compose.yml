# PFS — Docker stack for Hostinger (avoid port clashes with other stacks)
# Host ports: 8091 → SPA (+ /api proxied to backend), 5014 → API direct (optional)
# MongoDB is NOT published on the host (no conflict with mrd-mongodb :27017)

name: pfs

services:
  mongodb:
    image: mongo:7
    container_name: pfs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: feedbacksystem
    volumes:
      - pfs_mongo_data:/data/db
    networks:
      - pfs_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pfs_backend
    restart: unless-stopped
    ports:
      - "5014:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: mongodb://mongodb:27017/feedbacksystem
      # TMS integration — leave unset locally if you don't want forwarding to TMS.
      # If both stacks share a Docker network, use http://tms_backend:5000.
      TMS_API_URL: ${TMS_API_URL:-}
      TMS_EMP_ID: ${TMS_EMP_ID:-}
      TMS_PASSWORD: ${TMS_PASSWORD:-}
      TMS_FEEDBACK_DEPARTMENT_ID: ${TMS_FEEDBACK_DEPARTMENT_ID:-}
      TMS_FEEDBACK_CATEGORY_ID: ${TMS_FEEDBACK_CATEGORY_ID:-}
      TMS_FEEDBACK_SUBCATEGORY_ID: ${TMS_FEEDBACK_SUBCATEGORY_ID:-}
      TMS_FEEDBACK_PRIORITY: ${TMS_FEEDBACK_PRIORITY:-}
      TMS_CLIENT_URL: ${TMS_CLIENT_URL:-}
    # Create backend/.env on the server from backend/.env.example (secrets, OPENROUTER_API_KEY, TMS_*, etc.)
    env_file:
      - ./backend/.env
    volumes:
      # Persistent voice/bot recordings — survives container rebuilds.
      - pfs_uploads_data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - pfs_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pfs_frontend
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
    networks:
      - pfs_net

volumes:
  pfs_mongo_data:
  pfs_uploads_data:

networks:
  pfs_net:
    driver: bridge
